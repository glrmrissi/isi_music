[changelog]
header = "# Changelog\n\nAll notable changes to this project will be documented in this file.\n"
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}{% if commit.scope %} ({{ commit.scope }}){% endif %}
{%- endfor %}
{% endfor %}
{% if contrib_users | length > 0 %}
---

**Contributors:** {% for username in contrib_users | unique %}@{{ username }}{% if not loop.last %}, {% endif %}{% endfor %}
{% endif %}
"""
footer = """
---
Generated by [git-cliff](https://github.com/orhun/git-cliff).
"""
# don't generate changelog for these commits
skip_commits = ["chore\\(deps\\)", "^chore: v", "Merge.*"]
trim = true
postprocessors = []

[git]
conventional_commits = true
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^style", group = "Style" },
  { message = "^docs", group = "Documentation" },
  { message = "^chore", group = "Maintenance" },
  { message = "^test", group = "Testing" },
  { message = "^ci", group = "Continuous Integration" },
  { message = "^build", group = "Build" },
  { message = "^revert", group = "Revert" },
]
filter_commits = false
topo_order = false
# sort by type
sort_commits = "newest"

[remote.github]
owner = "glrmrissi"
repo = "isi-music"
