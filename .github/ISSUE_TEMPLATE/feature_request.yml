name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea! Please describe it clearly so we can understand the use case.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the feature you'd like.
      placeholder: I'd love to have support for...
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Why would this be useful? What problem does it solve?
      placeholder: When I'm listening to music, I often want to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you envision this working?
      placeholder: A new keybinding that...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any workarounds or alternative approaches?
      placeholder: I tried doing X instead, but...

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, mockups, or references to similar features in other projects.
